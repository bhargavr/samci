variables:
  AWS_REGION: us-east-1
  STACK_NAME: granite-packer-stack
  AWS_DEFAULT_REGION: us-east-1

stages:
  - build
  - deploy-backend
  - deploy-frontend

# Cache dependencies
.cache_template: &cache_definition
  cache:
    key:
      files:
        - backend/requirements.txt
        - frontend/package-lock.json
    paths:
      - .sam/
      - frontend/node_modules/

build-backend:
  stage: build
  image: public.ecr.aws/sam/build-python3.11
  <<: *cache_definition
  script:
    - sam build --use-container --cached --parallel
  artifacts:
    paths:
      - .aws-sam/
    expire_in: 1 hour

deploy-backend:
  stage: deploy-backend
  image: public.ecr.aws/sam/build-python3.11
  dependencies:
    - build-backend
  before_script:
    - pip install awscli
  script:
    # Determine environment
    - |
      if [ "$CI_COMMIT_BRANCH" == "main" ]; then
        export ENVIRONMENT=prod
      else
        export ENVIRONMENT=dev
      fi
    - echo "Deploying to environment: $ENVIRONMENT"

    # Deploy with SAM
    - |
      sam deploy \
        --no-confirm-changeset \
        --no-fail-on-empty-changeset \
        --parameter-overrides "Environment=$ENVIRONMENT"

    # Get API URL
    - |
      API_URL=$(aws cloudformation describe-stacks \
        --stack-name $STACK_NAME \
        --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
        --output text)
      echo "API_URL=$API_URL" >> deploy.env
      echo "API URL: $API_URL"

    # Test API
    - |
      HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/")
      if [ "$HTTP_CODE" != "200" ]; then
        echo "API health check failed with status $HTTP_CODE"
        exit 1
      fi
      echo "API health check passed"

  artifacts:
    reports:
      dotenv: deploy.env
    expire_in: 1 hour
  only:
    - main
    - develop

build-frontend:
  stage: deploy-frontend
  image: node:18
  dependencies:
    - deploy-backend
  before_script:
    - cd frontend
    - npm ci
  script:
    # Create production env file
    - |
      cat > .env.production << EOF
      VITE_API_URL=$API_URL
      VITE_ENVIRONMENT=production
      EOF

    # Build React app
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour
  only:
    - main
    - develop

deploy-frontend:
  stage: deploy-frontend
  image: amazon/aws-cli
  dependencies:
    - build-frontend
    - deploy-backend
  before_script:
    - yum install -y jq
  script:
    # Get stack outputs
    - |
      BUCKET_NAME=$(aws cloudformation describe-stacks \
        --stack-name $STACK_NAME \
        --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
        --output text)

      CLOUDFRONT_ID=$(aws cloudformation describe-stacks \
        --stack-name $STACK_NAME \
        --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDomain'].OutputValue" \
        --output text | cut -d'.' -f1)

      CLOUDFRONT_URL=$(aws cloudformation describe-stacks \
        --stack-name $STACK_NAME \
        --query "Stacks[0].Outputs[?OutputKey=='CloudFrontUrl'].OutputValue" \
        --output text)

    - echo "Bucket: $BUCKET_NAME"
    - echo "CloudFront: $CLOUDFRONT_ID"

    # Upload to S3
    - cd frontend
    - |
      aws s3 sync dist/ s3://$BUCKET_NAME/ \
        --delete \
        --cache-control "public, max-age=31536000" \
        --exclude "index.html" \
        --exclude "*.map"

    - |
      aws s3 cp dist/index.html s3://$BUCKET_NAME/index.html \
        --cache-control "public, max-age=0, must-revalidate" \
        --content-type "text/html"

    # Invalidate CloudFront
    - |
      INVALIDATION_ID=$(aws cloudfront create-invalidation \
        --distribution-id $CLOUDFRONT_ID \
        --paths "/*" \
        --query "Invalidation.Id" \
        --output text)
      echo "CloudFront invalidation: $INVALIDATION_ID"

    # Output summary
    - echo "✅ Deployment complete!"
    - echo "Frontend URL: $CLOUDFRONT_URL"
    - echo "API URL: $API_URL"

  only:
    - main
    - develop
